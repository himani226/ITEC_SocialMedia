<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HeyHimani AR Scene</title>

  <!-- ✅ FIXED: Using stable jsDelivr CDN for AR.js -->
  <script src="https://cdn.jsdelivr.net/npm/aframe@1.4.2/dist/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ar.js@2.2.2/aframe/build/aframe-ar.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }

    /* Status overlay */
    #status {
      position: fixed; top: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.75);
      color: #fff; font-family: Arial, sans-serif;
      font-size: 14px; padding: 10px 16px;
      z-index: 9999; text-align: center;
      pointer-events: none;
    }
    #status.ok  { background: rgba(0,180,100,0.85); }
    #status.err { background: rgba(220,50,50,0.9); }

    /* Instructions card */
    #instructions {
      position: fixed; bottom: 20px; left: 50%;
      transform: translateX(-50%);
      background: rgba(108,99,255,0.92);
      color: #fff; font-family: Arial, sans-serif;
      font-size: 13px; padding: 12px 20px;
      border-radius: 12px; z-index: 9999;
      text-align: center; max-width: 320px;
      pointer-events: none;
    }
    #instructions strong { display: block; font-size: 15px; margin-bottom: 4px; }

    /* Hiro marker image for testing */
    #marker-img {
      position: fixed; top: 50%; right: 10px;
      transform: translateY(-50%);
      width: 100px; height: 100px;
      border: 3px solid #6C63FF;
      border-radius: 8px;
      z-index: 9999;
      background: white;
    }
    #marker-label {
      position: fixed; top: calc(50% + 55px); right: 10px;
      transform: translateX(0);
      font-family: Arial, sans-serif; font-size: 10px;
      color: #fff; background: rgba(0,0,0,0.7);
      padding: 3px 6px; border-radius: 4px;
      z-index: 9999; text-align: center; width: 100px;
    }
  </style>
</head>
<body>

  <div id="status">⏳ Loading AR... allow camera when prompted</div>

  <div id="instructions">
    <strong>📷 Point camera at the Hiro marker →</strong>
    A purple spinning cube will appear above it
  </div>

  <!-- Hiro marker shown on screen for testing (point your other camera at this) -->
  <img id="marker-img"
    src="https://raw.githubusercontent.com/nicktarnold/AR.js/dev/data/images/hiro.png"
    alt="Hiro Marker"
    onerror="this.style.display='none'">
  <div id="marker-label">Hiro Marker<br>(point camera here)</div>

  <!-- ✅ FIXED a-scene: vr-mode-ui disabled, correct arjs attributes -->
  <a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true; precision: medium;"
    loading-screen="enabled: false">

    <!-- Assets -->
    <a-assets></a-assets>

    <!-- ✅ Hiro marker with 3D content -->
    <a-marker preset="hiro" id="hiro-marker">

      <!-- Purple spinning cube -->
      <a-box
        position="0 0.5 0"
        width="0.8" height="0.8" depth="0.8"
        color="#6C63FF"
        opacity="0.95"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 3000; easing: linear">
      </a-box>

      <!-- Glowing ring -->
      <a-torus
        position="0 0.05 0"
        radius="0.6"
        radius-tubular="0.04"
        color="#00E5FF"
        opacity="0.8"
        animation="property: rotation; from: 0 0 0; to: 0 360 0; loop: true; dur: 4000; easing: linear">
      </a-torus>

      <!-- Floating text -->
      <a-text
        value="HeyHimani AR"
        position="0 1.5 0"
        color="#00E5FF"
        align="center"
        width="4"
        animation="property: position; from: 0 1.5 0; to: 0 1.8 0; dir: alternate; loop: true; dur: 1200; easing: easeInOutSine">
      </a-text>

      <!-- Small sphere on top -->
      <a-sphere
        position="0 1.2 0"
        radius="0.12"
        color="#00FF9F"
        animation="property: rotation; to: 360 360 0; loop: true; dur: 2000; easing: linear">
      </a-sphere>

    </a-marker>

    <!-- Camera -->
    <a-entity camera></a-entity>

  </a-scene>

  <script>
    const statusEl = document.getElementById('status');

    // ── Check camera permission ──────────────────────────────────────────
    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
      .then(stream => {
        statusEl.textContent = '✅ Camera active — point at the Hiro marker';
        statusEl.classList.add('ok');
        stream.getTracks().forEach(t => t.stop()); // AR.js will open its own stream
        setTimeout(() => statusEl.style.display = 'none', 3000);
      })
      .catch(err => {
        statusEl.textContent = '❌ Camera denied: ' + err.message + ' — please allow camera access and reload';
        statusEl.classList.add('err');
      });

    // ── Marker found / lost events ───────────────────────────────────────
    document.querySelector('#hiro-marker').addEventListener('markerFound', () => {
      statusEl.textContent = '🎯 Marker detected! AR is live!';
      statusEl.className = 'ok';
      statusEl.style.display = 'block';
      setTimeout(() => statusEl.style.display = 'none', 2000);
    });

    document.querySelector('#hiro-marker').addEventListener('markerLost', () => {
      statusEl.textContent = '🔍 Looking for marker...';
      statusEl.className = '';
      statusEl.style.display = 'block';
    });

    // ── Catch script load errors ─────────────────────────────────────────
    window.addEventListener('error', (e) => {
      if (e.filename && (e.filename.includes('aframe') || e.filename.includes('ar.js'))) {
        statusEl.textContent = '❌ Script failed to load. Check internet connection.';
        statusEl.classList.add('err');
      }
    });
  </script>

</body>
</html>
