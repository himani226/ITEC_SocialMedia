<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>HeyHimani AR - Mobile</title>
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.5/aframe/build/aframe-ar.js"></script>
  <style>
    body { margin: 0; overflow: hidden; }
    #status {
      position: fixed; top: 10px; left: 10px; right: 10px;
      background: rgba(0,0,0,0.6); color: white;
      padding: 10px; text-align: center; font-family: sans-serif;
      z-index: 10; border-radius: 5px; pointer-events: none;
    }
  </style>
</head>
<body>

  <div id="status">Scanning for Hiro Marker...</div>

  <a-scene
    embedded
    vr-mode-ui="enabled: false"
    arjs="sourceType: webcam; 
          debugUIEnabled: false; 
          detectionMode: mono_and_matrix; 
          matrixCodeType: 3x3;
          videoTexture: true; 
          displayHeight: 1280; 
          displayWidth: 720;">

    <a-marker preset="hiro" id="hiro-marker">
      
      <a-entity scale="0.3 0.3 0.3">
        
        <a-box
          position="0 0.5 0"
          material="color: #6C63FF; opacity: 0.9;"
          animation="property: rotation; to: 0 360 0; loop: true; dur: 3000; easing: linear">
        </a-box>

        <a-torus
          position="0 0.1 0"
          rotation="90 0 0"
          radius="0.6"
          radius-tubular="0.02"
          color="#00E5FF">
        </a-torus>

        <a-text
          value="HeyHimani AR"
          position="0 1.5 0"
          rotation="-90 0 0"
          color="#00E5FF"
          align="center"
          width="6">
        </a-text>

      </a-entity>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    const statusEl = document.getElementById('status');
    const marker = document.querySelector('#hiro-marker');

    marker.addEventListener('markerFound', () => {
      statusEl.innerText = "🎯 Found!";
      statusEl.style.background = "rgba(0, 150, 0, 0.7)";
    });

    marker.addEventListener('markerLost', () => {
      statusEl.innerText = "Scanning for Hiro Marker...";
      statusEl.style.background = "rgba(0, 0, 0, 0.6)";
    });
  </script>
</body>
</html>
