<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>HeyHimani AR - Final</title>
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.5/aframe/build/aframe-ar.js"></script>
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    #status {
      position: fixed; top: 10px; left: 10px; right: 10px;
      background: rgba(0,0,0,0.8); color: white;
      padding: 15px; text-align: center; font-family: sans-serif;
      z-index: 999; border-radius: 8px;
    }
  </style>
</head>
<body>

  <div id="status">🔍 Point at Hiro Marker...</div>

  <a-scene
    embedded
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: false;"
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;">

    <a-marker preset="hiro" id="hiro-marker" emitevents="true">
      
      <a-entity scale="0.3 0.3 0.3">
        <a-box position="0 0.5 0" color="#6C63FF" 
               animation="property: rotation; to: 0 360 0; loop: true; dur: 3000">
        </a-box>
        <a-text value="HeyHimani AR" position="0 1.2 0" rotation="-90 0 0" 
                color="#00E5FF" align="center" width="5">
        </a-text>
      </a-entity>

    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    const statusEl = document.getElementById('status');
    const marker = document.querySelector('#hiro-marker');

    // These will only fire if emitevents="true" is in the <a-marker>
    marker.addEventListener('markerFound', () => {
      statusEl.innerHTML = "🎯 <span style='color:#00FF9F'>TARGET FOUND!</span>";
    });

    marker.addEventListener('markerLost', () => {
      statusEl.innerHTML = "🔍 Looking for Hiro Marker...";
    });
  </script>
</body>
</html>
