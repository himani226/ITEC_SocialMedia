<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>HeyHimani AR - Final Fix</title>
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.5/aframe/build/aframe-ar.js"></script>
  <style>
    body { margin: 0; overflow: hidden; background-color: #000; }
    /* Force the A-Frame canvas to stay above the video feed */
    .a-canvas {
      position: absolute;
      top: 0;
      left: 0;
      z-index: 5;
    }
    #status {
      position: fixed; top: 15px; left: 50%; transform: translateX(-50%);
      width: 80%; background: rgba(0,0,0,0.8); color: white;
      padding: 12px; text-align: center; font-family: sans-serif;
      z-index: 100; border-radius: 10px; font-size: 14px;
    }
  </style>
</head>
<body>

  <div id="status">🔍 Point at the Hiro Marker...</div>

  <a-scene
    embedded
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: false; precision: medium;"
    arjs="sourceType: webcam; 
          debugUIEnabled: false; 
          detectionMode: mono_and_matrix; 
          matrixCodeType: 3x3;
          sourceWidth: 640; sourceHeight: 480; 
          displayWidth: 640; displayHeight: 480;">

    <a-marker preset="hiro" id="hiro-marker">
      
      <a-entity scale="0.3 0.3 0.3" rotation="0 0 0">
        
        <a-box
          position="0 0.5 0"
          material="color: #6C63FF; opacity: 0.9;"
          animation="property: rotation; to: 0 360 0; loop: true; dur: 3000; easing: linear">
        </a-box>

        <a-torus
          position="0 0.1 0"
          rotation="90 0 0"
          radius="0.6"
          radius-tubular="0.02"
          color="#00E5FF">
        </a-torus>

        <a-text
          value="HeyHimani AR"
          position="0 1.5 0"
          rotation="-90 0 0"
          color="#00E5FF"
          align="center"
          width="6">
        </a-text>

      </a-entity>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    const statusEl = document.getElementById('status');
    const marker = document.querySelector('#hiro-marker');

    marker.addEventListener('markerFound', () => {
      statusEl.innerText = "🎯 TARGET DETECTED!";
      statusEl.style.background = "rgba(0, 200, 100, 0.9)";
    });

    marker.addEventListener('markerLost', () => {
      statusEl.innerText = "🔍 Looking for Hiro Marker...";
      statusEl.style.background = "rgba(0, 0, 0, 0.8)";
    });
  </script>
</body>
</html>
